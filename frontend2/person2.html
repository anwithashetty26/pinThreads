<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pinthreads — Content Detail View</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --card: #21253a;
    --border: #2e3347;
    --accent: #7c6cfc;
    --up: #4ade80;
    --down: #f87171;
    --text: #e8eaf0;
    --muted: #7a80a0;
    --radius: 14px;
    --font-head: 'Space Grotesk', sans-serif;
    --font-body: 'Inter', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
  }

  .feed-header {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .feed-header h1 {
    font-family: var(--font-head);
    font-size: 22px;
  }
  .feed-header h1 span { color: var(--accent); }
  .search-bar {
    margin-left: auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 8px 18px;
    color: var(--text);
    font-size: 14px;
    width: 220px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-bar:focus { border-color: var(--accent); }

  .feed {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
    padding: 28px 32px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.18s, box-shadow 0.18s;
  }
  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(124,108,252,0.2);
  }
  .card-thumb {
    width: 100%;
    height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 52px;
  }
  .card-body { padding: 14px 16px 10px; }
  .card-title {
    font-family: var(--font-head);
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 8px;
    line-height: 1.35;
  }
  .card-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--muted);
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 999px;
  }
  .badge.green  { background: rgba(74,222,128,.15); color: #4ade80; }
  .badge.yellow { background: rgba(250,204,21,.15);  color: #facc15; }
  .badge.red    { background: rgba(248,113,113,.15); color: #f87171; }

  .card-actions {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 16px 14px;
  }
  .vote-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--muted);
    font-size: 13px;
    padding: 5px 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: all 0.15s;
    font-family: var(--font-body);
  }
  .vote-btn.up:hover, .vote-btn.active-up { background: rgba(74,222,128,.15); color: var(--up); border-color: var(--up); }
  .vote-btn.down:hover, .vote-btn.active-down { background: rgba(248,113,113,.15); color: var(--down); border-color: var(--down); }
  .link-badge {
    margin-left: auto;
    font-size: 11px;
    background: rgba(124,108,252,.15);
    color: var(--accent);
    border-radius: 999px;
    padding: 3px 10px;
    font-weight: 600;
  }

  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    backdrop-filter: blur(6px);
    align-items: center;
    justify-content: center;
  }
  .overlay.open { display: flex; }

  .overlay-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    width: 90vw;
    max-width: 960px;
    max-height: 86vh;
    display: flex;
    overflow: hidden;
    animation: slideUp 0.22s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .media-canvas {
    flex: 0 0 48%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 90px;
    position: relative;
  }
  .media-caption {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.7));
    padding: 18px 18px 14px;
    font-size: 13px;
    color: #ccc;
  }
  .close-btn {
    position: absolute;
    top: 12px; right: 12px;
    background: rgba(0,0,0,0.5);
    border: none;
    border-radius: 999px;
    color: #fff;
    font-size: 16px;
    width: 32px; height: 32px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .close-btn:hover { background: rgba(248,113,113,0.7); }

  .info-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-left: 1px solid var(--border);
  }
  .info-top {
    padding: 20px 20px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .info-top h2 {
    font-family: var(--font-head);
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 10px;
    line-height: 1.3;
  }
  .info-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .info-votes { display: flex; gap: 8px; }

  .info-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .link-submission {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
  }
  .link-url { color: var(--accent); text-decoration: none; word-break: break-all; }
  .link-url:hover { text-decoration: underline; }

  .comments-label {
    font-family: var(--font-head);
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 14px;
  }
  .comment { margin-bottom: 6px; }
  .comment-header {
    display: flex;
    align-items: center;
    gap: 7px;
    margin-bottom: 4px;
  }
  .comment-avatar {
    width: 24px; height: 24px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700;
    flex-shrink: 0;
  }
  .comment-user { font-size: 13px; font-weight: 600; }
  .comment-time { font-size: 11px; color: var(--muted); }
  .collapse-btn {
    background: none; border: none;
    color: var(--muted); font-size: 11px; cursor: pointer;
    padding: 1px 5px; border-radius: 5px;
    font-family: var(--font-body);
  }
  .collapse-btn:hover { color: var(--accent); }
  .comment-text {
    font-size: 13px; line-height: 1.55;
    color: #c8cce0; padding-left: 31px;
  }
  .comment-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 5px;
    padding-left: 31px;
  }
  .comment-vote {
    background: none; border: none;
    color: var(--muted); font-size: 12px; cursor: pointer;
    padding: 2px 6px; border-radius: 5px;
    display: flex; align-items: center; gap: 3px;
    font-family: var(--font-body); transition: all 0.15s;
  }
  .comment-vote.up:hover, .comment-vote.active-up { color: var(--up); background: rgba(74,222,128,.10); }
  .comment-vote.down:hover, .comment-vote.active-down { color: var(--down); background: rgba(248,113,113,.10); }
  .reply-btn {
    background: none; border: none;
    color: var(--muted); font-size: 12px; cursor: pointer;
    border-radius: 5px; padding: 2px 6px;
    font-family: var(--font-body);
  }
  .reply-btn:hover { color: var(--accent); }
  .comment-children {
    margin-left: 18px;
    padding-left: 12px;
    border-left: 2px solid var(--border);
    margin-top: 8px;
  }
  .comment-children.collapsed { display: none; }
</style>
</head>
<body>

<header class="feed-header">
  <div>🧵</div>
  <h1>Pin<span>threads</span></h1>
  <input class="search-bar" placeholder="Search boards, topics..." />
</header>

<div class="feed" id="feed"></div>

<div class="overlay" id="overlay">
  <div class="overlay-panel">
    <div class="media-canvas" id="mediaCanvas">
      <button class="close-btn" onclick="closeOverlay()">X</button>
      <div id="overlayEmoji"></div>
      <div class="media-caption" id="mediaCaption"></div>
    </div>
    <div class="info-pane">
      <div class="info-top">
        <h2 id="overlayTitle"></h2>
        <div class="info-meta" id="overlayMeta"></div>
        <div class="info-votes" id="overlayVotes"></div>
      </div>
      <div class="info-scroll" id="infoScroll"></div>
    </div>
  </div>
</div>

<script>
var posts = [
  {
    id: 1,
    title: "Tokyo Hidden Alley Cafes - a photo thread",
    emoji: "🗼",
    gradient: "linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)",
    board: "r/UrbanExplore",
    author: "neon_wanderer",
    votes: 4821,
    verified: "green",
    link: "https://tokyocafeguide.com",
    comments: [
      { id:"c1", user:"sakura_fox", color:"#7c6cfc", votes:312,
        text:"The one in Shimokitazawa with the vinyl records is insane. Been there 3 times!",
        children:[
          { id:"c1a", user:"neon_wanderer", color:"#e8c84a", votes:98,
            text:"Thats Cafe Zoetrope! The owner has 10,000 records",
            children:[
              { id:"c1a1", user:"pixel_drift", color:"#4ade80", votes:44,
                text:"Wait they let you request any record? Thats wild.", children:[] }
            ]
          }
        ]
      },
      { id:"c2", user:"rooftop_ryujin", color:"#f87171", votes:201,
        text:"The map link in the post is broken for me, anyone have an updated one?",
        children:[
          { id:"c2a", user:"mapguru99", color:"#7c6cfc", votes:77,
            text:"Try the Wayback Machine archive, still works there!", children:[] }
        ]
      }
    ]
  },
  {
    id: 2,
    title: "Why brutalist UI is making a comeback in 2025",
    emoji: "🖥️",
    gradient: "linear-gradient(135deg,#0d0d0d,#1a1a1a,#2d2d2d)",
    board: "r/DesignTalk",
    author: "grid_ghost",
    votes: 2390,
    verified: "yellow",
    link: "https://brutalistdesign.io/revival",
    comments: [
      { id:"c3", user:"sans_serif_sam", color:"#e8c84a", votes:540,
        text:"The irony of a brutalist article having the cleanest layout I have seen this year.",
        children:[
          { id:"c3a", user:"grid_ghost", color:"#7c6cfc", votes:210,
            text:"Intentional. The content argues for rawness but the container should be readable",
            children:[] }
        ]
      },
      { id:"c4", user:"voidwatcher", color:"#4ade80", votes:88,
        text:"Brutalism or not, accessible contrast ratios are non-negotiable.", children:[] }
    ]
  },
  {
    id: 3,
    title: "Homemade sourdough: 6-month journey in pics",
    emoji: "🍞",
    gradient: "linear-gradient(135deg,#3d1c0a,#6b3a1f,#a0522d)",
    board: "r/BreadHeads",
    author: "crust_queen",
    votes: 9102,
    verified: "green",
    link: null,
    comments: [
      { id:"c5", user:"yeast_beast", color:"#f87171", votes:720,
        text:"Month 3 loaf looks unreal. What hydration were you at?",
        children:[
          { id:"c5a", user:"crust_queen", color:"#4ade80", votes:300,
            text:"78 percent - it was scary but worth it. The open crumb started showing up!",
            children:[
              { id:"c5a1", user:"gluten_wizard", color:"#e8c84a", votes:115,
                text:"Pro tip: fridge cold proof for 18h at that hydration. Game changer.", children:[] }
            ]
          }
        ]
      }
    ]
  },
  {
    id: 4,
    title: "Study: remote work boosts deep focus by 34 percent",
    emoji: "💻",
    gradient: "linear-gradient(135deg,#0a1628,#1a2f5e,#0d3b8c)",
    board: "r/FutureOfWork",
    author: "async_andy",
    votes: 1550,
    verified: "red",
    link: "https://workresearch.org/deep-focus-2025",
    comments: [
      { id:"c6", user:"debunker_dan", color:"#f87171", votes:430,
        text:"The sample size was 180 people. Lets not overstate this.",
        children:[
          { id:"c6a", user:"async_andy", color:"#7c6cfc", votes:90,
            text:"Valid critique - I flagged the study as red verified for exactly that reason.",
            children:[] }
        ]
      }
    ]
  }
];

var cardVoteState = {};
var overlayVoteState = {};
var commentVotes = {};

var feed = document.getElementById('feed');

for (var i = 0; i < posts.length; i++) {
  var p = posts[i];
  var card = document.createElement('div');
  card.className = 'card';
  var vLabel = p.verified==='green' ? 'Verified' : p.verified==='yellow' ? 'Unverified' : 'Disputed';
  var linkBadge = p.link ? '<span class="link-badge">Link</span>' : '';
  card.innerHTML =
    '<div class="card-thumb" style="background:' + p.gradient + '">' + p.emoji + '</div>' +
    '<div class="card-body">' +
      '<div class="card-title">' + p.title + '</div>' +
      '<div class="card-meta">' +
        '<span>' + p.board + '</span>' +
        '<span>u/' + p.author + '</span>' +
        '<span class="badge ' + p.verified + '">' + vLabel + '</span>' +
      '</div>' +
    '</div>' +
    '<div class="card-actions">' +
      '<button class="vote-btn up" onclick="cardVote(event,' + p.id + ',\'up\')">Up <span id="cv-' + p.id + '">' + p.votes + '</span></button>' +
      '<button class="vote-btn down" onclick="cardVote(event,' + p.id + ',\'down\')">Down</button>' +
      linkBadge +
    '</div>';
  (function(post) {
    card.addEventListener('click', function() { openOverlay(post); });
  })(p);
  feed.appendChild(card);
}

function cardVote(e, id, dir) {
  e.stopPropagation();
  var post = null;
  for (var i=0; i<posts.length; i++) { if(posts[i].id===id) post=posts[i]; }
  var prev = cardVoteState[id];
  if (prev===dir) { post.votes += dir==='up'?-1:1; cardVoteState[id]=null; }
  else { if(prev==='up') post.votes--; if(prev==='down') post.votes++; post.votes += dir==='up'?1:-1; cardVoteState[id]=dir; }
  document.getElementById('cv-'+id).textContent = post.votes;
}

function openOverlay(post) {
  var vLabel = post.verified==='green'?'Verified':post.verified==='yellow'?'Unverified':'Disputed';
  document.getElementById('mediaCanvas').style.background = post.gradient;
  document.getElementById('overlayEmoji').textContent = post.emoji;
  document.getElementById('mediaCaption').textContent = post.board + ' by u/' + post.author;
  document.getElementById('overlayTitle').textContent = post.title;
  document.getElementById('overlayMeta').innerHTML =
    '<span class="badge ' + post.verified + '">' + vLabel + '</span>' +
    '<span>' + post.board + '</span>';
  document.getElementById('overlayVotes').innerHTML =
    '<button class="vote-btn up" onclick="overlayVote(' + post.id + ',\'up\')">Up <span id="ov-' + post.id + '">' + post.votes + '</span></button>' +
    '<button class="vote-btn down" onclick="overlayVote(' + post.id + ',\'down\')">Down</button>';
  var scroll = document.getElementById('infoScroll');
  scroll.innerHTML = '';
  if (post.link) {
    var ls = document.createElement('div');
    ls.className = 'link-submission';
    ls.innerHTML = 'Link: <a class="link-url" href="' + post.link + '" target="_blank">' + post.link + '</a>';
    scroll.appendChild(ls);
  }
  var cl = document.createElement('div');
  cl.className = 'comments-label';
  cl.textContent = countComments(post.comments) + ' Comments';
  scroll.appendChild(cl);
  for (var i=0; i<post.comments.length; i++) {
    scroll.appendChild(renderComment(post.comments[i]));
  }
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('overlay').addEventListener('click', function(e) {
  if (e.target === e.currentTarget) closeOverlay();
});

function overlayVote(id, dir) {
  var post = null;
  for (var i=0; i<posts.length; i++) { if(posts[i].id===id) post=posts[i]; }
  var prev = overlayVoteState[id];
  var el = document.getElementById('ov-'+id);
  if (!el) return;
  if (prev===dir) { post.votes += dir==='up'?-1:1; overlayVoteState[id]=null; }
  else { if(prev==='up') post.votes--; if(prev==='down') post.votes++; post.votes += dir==='up'?1:-1; overlayVoteState[id]=dir; }
  el.textContent = post.votes;
  var cv = document.getElementById('cv-'+id);
  if (cv) cv.textContent = post.votes;
}

function countComments(arr) {
  var n = 0;
  for (var i=0; i<arr.length; i++) { n += 1 + countComments(arr[i].children); }
  return n;
}

function renderComment(c) {
  var wrap = document.createElement('div');
  wrap.className = 'comment';
  var initials = c.user.slice(0,2).toUpperCase();
  var hasChildren = c.children && c.children.length > 0;
  var childId = 'ch-' + c.id;
  if (!(c.id in commentVotes)) commentVotes[c.id] = { v: c.votes, state: null };
  var collapseBtn = hasChildren ? '<button class="collapse-btn" onclick="toggleCollapse(\'' + childId + '\',this)">collapse</button>' : '';
  wrap.innerHTML =
    '<div class="comment-header">' +
      '<div class="comment-avatar" style="background:' + c.color + '22;color:' + c.color + '">' + initials + '</div>' +
      '<span class="comment-user" style="color:' + c.color + '">u/' + c.user + '</span>' +
      '<span class="comment-time">just now</span>' +
      collapseBtn +
    '</div>' +
    '<div class="comment-text">' + c.text + '</div>' +
    '<div class="comment-actions">' +
      '<button class="comment-vote up" id="cup-' + c.id + '" onclick="voteComment(\'' + c.id + '\',\'up\')">Up <span id="cv2-' + c.id + '">' + c.votes + '</span></button>' +
      '<button class="comment-vote down" id="cdn-' + c.id + '" onclick="voteComment(\'' + c.id + '\',\'down\')">Down</button>' +
      '<button class="reply-btn">Reply</button>' +
    '</div>';
  if (hasChildren) {
    var childWrap = document.createElement('div');
    childWrap.className = 'comment-children';
    childWrap.id = childId;
    for (var i=0; i<c.children.length; i++) {
      childWrap.appendChild(renderComment(c.children[i]));
    }
    wrap.appendChild(childWrap);
  }
  return wrap;
}

function toggleCollapse(id, btn) {
  var el = document.getElementById(id);
  if (!el) return;
  var collapsed = el.classList.toggle('collapsed');
  btn.textContent = collapsed ? 'expand' : 'collapse';
}

function voteComment(id, dir) {
  var state = commentVotes[id];
  if (!state) return;
  if (state.state===dir) { state.v += dir==='up'?-1:1; state.state=null; }
  else { if(state.state==='up') state.v--; if(state.state==='down') state.v++; state.v += dir==='up'?1:-1; state.state=dir; }
  var el = document.getElementById('cv2-'+id);
  if (el) el.textContent = state.v;
}
</script>
</body>
</html>
